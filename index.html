<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INKRYPT // VAULT STATION</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="matrix-theme">

    <canvas id="matrix-bg"></canvas>

    <div class="app-layout">
        
        <aside class="sidebar-obsidian">
            <div class="sidebar-header">
                <div class="status-dot"></div>
                <span class="vault-title">[K] VAULT</span>
                <button id="add-note-btn" class="icon-btn">+</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="note-search" placeholder="SCAN_DATABASE...">
            </div>

            <nav id="note-list" class="file-tree">
                </nav>
        </aside>

        <main class="terminal-container">
            
            <header class="terminal-header">
                <div class="brand">
                    <span class="glitch" data-text="INKRYPT">INKRYPT</span>
                    <span class="version">V2.0.4-STABLE</span>
                </div>
                <div class="nav-tabs">
                    <button class="tab-link active" onclick="showView('decrypt')">DECRYPT_CORE</button>
                    <button class="tab-link" onclick="showView('notes')">NOTE_EDITOR</button>
                </div>
            </header>

            <section id="view-decrypt" class="view-content active">
                <div class="crypto-card">
                    <div class="card-label">>> MESSAGE_SOURCE</div>
                    <textarea id="message" placeholder="Entrez votre texte ici..."></textarea>
                    
                    <div class="card-label">>> CLÉ_SECRÈTE (MIN. 8 CARACTÈRES)</div>
                    <div class="input-wrapper">
                        <input type="password" id="secret" placeholder="Il faut une clé robuste">
                        <button class="view-toggle" onclick="togglePass()">👁</button>
                    </div>

                    <div class="button-group">
                        <button id="btn-encrypt" class="btn-main neon-glow">⬢ CHIFFRER</button>
                        <button id="btn-decrypt" class="btn-main secondary">⬢ DÉCHIFFRER</button>
                    </div>

                    <div class="card-label">>> RÉSULTAT</div>
                    <div class="result-wrapper">
                        <textarea id="result" readonly placeholder="Le résultat apparaîtra ici..."></textarea>
                        <button class="copy-btn" onclick="copyToClipboard()">⎘</button>
                    </div>
                </div>
            </section>

            <section id="view-notes" class="view-content">
                <div class="obsidian-editor">
                    <input type="text" id="note-title-input" class="note-title" placeholder="Titre de la note...">
                    <div class="editor-split">
                        <textarea id="note-textarea" placeholder="Tapez votre note (Markdown supporté)..."></textarea>
                        <div id="markdown-preview" class="preview-area"></div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="js/matrix.js"></script>
    <script src="js/crypt.js"></script>
    <script src="js/obsidian.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
