<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INKRYPT // VAULT STATION</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="matrix-theme">
    <canvas id="matrix-bg"></canvas>

    <div class="app-layout">
        <aside class="sidebar-obsidian">
            <div class="sidebar-header">
                <span class="vault-title">[K] VAULT</span>
                <div class="header-actions">
                    <button class="icon-btn" onclick="createNewNote()" title="Nouvelle note">+</button>
                    <button class="icon-btn delete" onclick="deleteCurrentNote()" title="Supprimer la note">×</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="note-search" placeholder="SCAN_DATABASE..." oninput="filterNotes()">
            </div>
            <nav id="note-list" class="file-tree"></nav>
        </aside>

        <main class="terminal-container">
            <header class="terminal-header">
                <div class="brand">
                    <span class="logo-main"><span class="bracket">[</span> INK<span class="neon-text">RYPT</span> <span class="bracket">]</span></span>
                    <span class="version">WEB CRYPTO · ZERO DÉPENDANCE · PAR FEGO.EXE</span>
                </div>
                <div class="nav-tabs">
                    <button id="tab-decrypt" class="tab-link active" onclick="showView('decrypt')">DECRYPT_CORE</button>
                    <button id="tab-notes" class="tab-link" onclick="showView('notes')">NOTE_EDITOR</button>
                </div>
            </header>

            <section id="view-decrypt" class="view-content active">
                <div class="crypto-card">
                    <div class="card-label">▶ MESSAGE SOURCE</div>
                    <textarea id="message" placeholder="Entrez votre texte ici..."></textarea>
                    
                    <div class="card-label">▶ CLÉ SECRÈTE <span class="min-char">MIN. 8 CARACTÈRES</span></div>
                    <div class="input-wrapper">
                        <input type="password" id="secret" placeholder="Clé de chiffrement...">
                        <button class="view-toggle" onclick="togglePass()">👁</button>
                    </div>

                    <div class="button-group">
                        <button id="btn-encrypt" class="btn-main neon-glow" onclick="handleEncrypt()">⬢ CHIFFRER</button>
                        <button id="btn-decrypt" class="btn-main secondary" onclick="handleDecrypt()">⬢ DÉCHIFFRER</button>
                    </div>

                    <div class="card-label">◆ RÉSULTAT</div>
                    <div class="result-wrapper">
                        <textarea id="result" readonly placeholder="Résultat..."></textarea>
                        <button class="copy-btn" onclick="copyResult()">⎘</button>
                    </div>
                </div>
            </section>

            <section id="view-notes" class="view-content">
                <div class="obsidian-editor">
                    <input type="text" id="note-title-input" class="note-title" placeholder="Titre de la note..." oninput="autoSaveNote()">
                    
                    <div class="toolbar">
                        <button onclick="insertFormat('bold')">B</button>
                        <button onclick="insertFormat('italic')">I</button>
                        <button onclick="insertFormat('h1')">H1</button>
                        <button onclick="insertFormat('h2')">H2</button>
                        <button onclick="insertFormat('list')">•</button>
                        <button onclick="insertFormat('code')">{}</button>
                    </div>

                    <div class="editor-split">
                        <textarea id="note-textarea" placeholder="Markdown ici..." oninput="autoSaveNote()"></textarea>
                        <div id="markdown-preview" class="preview-area"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="JS/matrix.js"></script>
    <script src="JS/crypt.js"></script>
    <script src="JS/obsidian.js"></script>
    <script src="JS/app.js"></script>
</body>
</html>
