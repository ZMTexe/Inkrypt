<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INKRYPT</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<canvas id="matrix-bg"></canvas>
<div class="noise"></div>
<div class="grid-bg"></div>

<!-- SIDEBAR -->
<aside class="sidebar">

  <div class="logo-mini">IK</div>

  <nav class="nav">
    <button class="nav-item active">🔐</button>
    <button class="nav-item">🔑</button>
    <button class="nav-item">📝</button>
    <button class="nav-item">🧹</button>
  </nav>

</aside>

<!-- APP -->
<div class="app">

<header>
  <h1 class="logo">
    <span>[</span> INK<span class="accent">RYPT</span> <span>]</span>
  </h1>
  <p class="tagline">WebCrypto · Zero dépendance · Local only</p>
</header>

<main>
  <div class="card" id="card">

    <div class="field">
      <label>MESSAGE</label>
      <textarea id="message"></textarea>
    </div>

    <div class="field">
      <label>CLÉ</label>
      <div class="input-row">
        <input type="password" id="secret">
        <button id="togglePwd">👁</button>
      </div>
      <div class="strength"><div id="strengthFill"></div></div>
    </div>

    <div class="actions">
      <button id="btnEncrypt" class="btn primary">CHIFFRER</button>
      <button id="btnDecrypt" class="btn secondary">DÉCHIFFRER</button>
    </div>

    <div class="field">
      <label>RÉSULTAT</label>
      <textarea id="result" readonly></textarea>
    </div>

  </div>
</main>

</div>

<script src="script.js"></script>
</body>
</html>
